<!DOCTYPE html>
<html lang="ja">
<head>
    <link rel="manifest" href="/manifest.json">

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .then(reg => console.log('SW登録成功!', reg))
        .catch(err => console.error('SW登録失敗...', err));
    });
  }
</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voton dengikenに登録</title>
    <style>
        body {
            margin: 0;
            background: #0b0e14;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
        }

        h1 {
            color: #00fbff;
            margin-bottom: 20px;
        }

        .login-container {
            width: 300px;
        }

        .input-group {
            position: relative;
            margin-bottom: 30px;
        }

        .input-group input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid #333;
            padding: 10px 0;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        .input-group label {
            position: absolute;
            top: 10px;
            left: 0;
            color: #666;
            pointer-events: none;
            transition: 0.3s;
        }

        .input-group input:focus ~ label,
        .input-group input:valid ~ label {
            top: -15px;
            font-size: 12px;
            color: #00fbff;
        }

        .input-group input:focus {
            border-bottom: 1px solid #00fbff;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid #00fbff;
            color: #00fbff;
            font-size: 14px;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.4s;
            text-transform: uppercase;
        }

        .login-btn:hover {
            background: #00fbff;
            color: #000;
            box-shadow: 0 0 20px rgba(0, 251, 255, 0.4);
        }
    </style>
</head>
<body>
    <h1>部員登録(一般者は不可)</h1>
    <div class="login-container">
        <form>
            <div class="input-group">
                <input type="text" required>
                <label>学籍番号</label>
            </div>
            <div class="input-group">
                <input type="name" required>
                <label>名前　例:芝浦太郎</label>
            </div>
            <button type="button" class="login-btn">申請</button>
        </form>
    </div>
</body>
</html>
