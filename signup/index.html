<!DOCTYPE html>
<html>
  <head>
    <title>Voton Dengiken Accountを作成</title>
  </head>
  <body>
    <header>
      <h1>会員専用登録のため、一般者の登録は不可能です</h1></h1>
    </header>
    <div class='login_dengi'>
      <p>Voton Dengiken Accountにサインインするためメールアドレスを入力してください</p>
      <input type='text' id='mailadress_input' placeholder='メールアドレスを入力... 例:sample@example.com'></input>
      <br><button type='submit'>次へ</button>
    </div>
  </body>
  <style>
    input#mailadress_input{
      width:20rem;
      height:1rem;
    }
    body{
      text-align:center;
      background-color:#a8cfff
    }
    div.login_dengi{
      background-color:#d6f5d6;
      margin:10px;
      box-shadow:8px 8px 6px gray;
      border-radius:8px;
      width:60%
      boader-color:solid 2px;
    }
  </style>
</html>
