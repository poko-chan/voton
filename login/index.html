<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voton Dengiken Accountにログイン - Voton</title>
    <style>
        body {
            margin: 0;
            background: #0b0e14;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
            color: #0ff;
        }

        h1 { margin-bottom: 20px; }

        .login-container { width: 300px; }

        .input-group {
            position: relative;
            margin-bottom: 30px;
        }

        .input-group input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid #333;
            padding: 10px 0;
            color: #fff;
            font-size: 16px;
            outline: none;
        }

        .input-group label {
            position: absolute;
            top: 10px;
            left: 0;
            color: #666;
            pointer-events: none;
            transition: 0.3s;
        }

        .input-group input:focus ~ label,
        .input-group input:valid ~ label {
            top: -15px;
            font-size: 12px;
            color: #0ff;
        }

        .input-group input:focus { border-bottom: 1px solid #0ff; }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid #0ff;
            color: #0ff;
            cursor: pointer;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <h1>部員ログイン</h1>
    <div class="login-container">
        <form>
            <div class="input-group">
                <input type="text" required>
                <label>学籍番号</label>
            </div>
            <div class="input-group">
                <input type="password" required>
                <label>パスワード</label>
            </div>
            <button type="button" class="login-btn">ログイン</button>
        </form>
    </div>
</body>
</html>
