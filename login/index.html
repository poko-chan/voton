    </header>
    <div class='login_dengi'>
      <p>Voton Dengiken Accountにサインインするためメールアドレスを入力してください</p>

  <style>

    }
    body{
      text-align:center;
    }
    div.voton_dengi{
      margin:10px;
      box-shadow:4px 4px 2px gray;
    }
  </style>
