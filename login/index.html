<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voton Dengiken Accountに学籍番号を入力してログイン - Voton</title>
    <style>
        body {
            margin: 0;
            background: #0b0e14;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
        }

        h1 {
            color: #0ff;
            text-shadow: 0 0 8px #0ff;
            margin-bottom: 20px;
        }
        body{
            color: #0ff;
            text-shadow: 0 0 8px #0ff;
        }

        .login-container {
            width: 300px;
        }

        .input-group {
            position: relative;
            margin-bottom: 30px;
        }

        .input-group input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid #333;
            padding: 10px 0;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        .input-group label {
            position: absolute;
            top: 10px;
            left: 0;
            color: #666;
            pointer-events: none;
            transition: 0.3s;
            text-shadow: 0 0 6px #979494;
        }
        .input-group input:focus ~ label,
        .input-group input:valid ~ label {
            top: -15px;
            font-size: 12px;
            color: #0ff;
            text-shadow: 0 0 8px #0ff;
        }

        .input-group input:focus {
            border-bottom: 1px solid #0ff;
        }

        button#login_btn {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid #0ff;
            color: #0ff;
            font-size: 14px;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.4s;
            text-transform: uppercase;
        }

        button#login_btn:hover {
            background: #0ff;
            color: #000;
            box-shadow: 0 0 20px rgba(0, 251, 255, 0.4);
        }
    </style>
</head>
<body>
    <h1>部員ログイン</h1>
    <div class="login-container">
        <form>
            <div class="input-group">
                <input type="text" required id='num_input'>
                <label for='num_input'>学籍番号</label>
            </div>
            <button type="submit" id="login_btn">ログイン</button>
        </form>
    </div>
</body>
<script>
    document.getElementById('login_btn').addEventListener('click', function(event) {
      event.preventDefault()
      let address = document.getElementById('num_input').value;
      if (address){
        let redirectURL = '/login/mail-pass.html?ad=' + encodeURIComponent(address);
        window.location.href = redirectURL;
      }else{
        alert('学籍番号を入力してください');
      }
    });
  </script>
</html>
