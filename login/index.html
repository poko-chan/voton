<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voton Dengiken Account</title>
    <style>
        @font-face {
          font-family: "Kaisotai";
          src: url("/src/font/Kaisotai-Next-UP-B.woff2") format("woff2");
        }
        body {
            margin: 0;
            background: #0b0e14;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #0ff;
            text-shadow: 0 0 8px #0ff;
        }
        * {
            font-family: "Kaisotai", sans-serif;
            box-sizing: border-box;
        }
        h1 {
            margin-bottom: 20px;
        }
        .login-container {
            width: 300px;
        }
        .input-group {
            position: relative;
            margin-bottom: 30px;
        }
        .input-group input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid #333;
            padding: 10px 0;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }
        .input-group label {
            position: absolute;
            top: 10px;
            left: 0;
            color: #666;
            pointer-events: none;
            transition: 0.3s;
            text-shadow: 0 0 6px #979494;
        }
        .input-group input:focus ~ label,
        .input-group input:valid ~ label {
            top: -15px;
            font-size: 12px;
            color: #0ff;
            text-shadow: 0 0 8px #0ff;
        }
        .input-group input:focus {
            border-bottom: 1px solid #0ff;
        }
        button#login_btn {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid #0ff;
            color: #0ff;
            font-size: 14px;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.4s;
            text-transform: uppercase;
        }
        button#login_btn:hover {
            background: #0ff;
            color: #000;
            box-shadow: 0 0 20px rgba(0, 251, 255, 0.4);
        }
    </style>
</head>
<body>
    <h1>部員ログイン</h1>
    <div class="login-container">
        <form id="login_form">
            <div class="input-group">
                <input type="text" required id="num_input" autocomplete="username">
                <label for="num_input">学籍番号</label>
            </div>
            <div class="input-group">
                <input type="password" required id="pass_input" autocomplete="current-password">
                <label for="pass_input">パスワード</label>
            </div>
            <button type="submit" id="login_btn">ログイン</button>
        </form>
    </div>
    <script>
        document.getElementById('login_form').addEventListener('submit', function(e) {
            e.preventDefault();
            const id = document.getElementById('num_input').value;
            const pw = document.getElementById('pass_input').value;
            if (id && pw) {
                console.log('Login attempt:', id);
                alert('ログイン処理（DB未接続）');
            }
        });
    </script>
</body>
</html>
