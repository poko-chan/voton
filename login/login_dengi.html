<!DOCTYPE html>
<html>
  <head>
    <title>Voton Dengiken Accountにログイン</title>
  </head>
  <body>
    <header>
      <h1>Voton dengiken Account</h1>
    </header>
    <div class='login_dengi'>
      <p>Voton Dengiken Accountにサインインするためメールアドレスを入力してください</p>
      <input type='email' id='mailadress_input' placeholder='メールアドレスを入力... 例:sample@example.com'></input>
      <br><button type='submit' id='submit_btn'>次へ</button>
    </div>
  </body>
  <style>
    input#mailadress_input{
      width:20rem;
      height:1rem;
    }
    body{
      text-align:center;
      background-color:#a8cfff
    }
    div.login_dengi{
      background-color:#d6f5d6;
      margin:10px;
      box-shadow:8px 8px 6px gray;
      border-radius:8px;
      width:60%
      boader-color:solid 2px;
    }
  </style>
  <script>
    document.getElementById('submit_btn').addEventListener('click', function(event) {
      let adress = document.getElementById('mailadress_input').value;
      if (adress){
        let redirectURL = '/login/mail-pass.html?ad=' + encodeURIComponent(adress);
        window.location.href = redirectURL;
      }else{
        alert('メールアドレスを正しく入力してください');
      }
    });
  </script>
</html>
