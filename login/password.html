<!DOCTYPE html>
<html lang="ja-JP">
<head>
    <link rel="manifest" href="/manifest.json">

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .then(reg => console.log('SW登録成功!', reg))
        .catch(err => console.error('SW登録失敗...', err));
    });
  }
</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voton Dengiken Accountにログイン - Voton</title>
    <style>
        @font-face {
            font-family: "Kaisotai";
            src: url("/src/font/Kaisotai-Next-UP-B.woff2") format("woff2");
        }
        * {
            font-family: "Kaisotai", sans-serif;
            box-sizing: border-box;
        }
        body {
            margin: 0;
            background: #0b0e14;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #0ff;
            text-shadow: 0 0 8px #0ff;
        }

        h1 {
            margin-bottom: 10px;
            font-size: 24px;
        }

        h3 {
            margin-bottom: 30px;
            font-weight: normal;
            font-size: 16px;
        }

        .login-container {
            width: 300px;
        }

        .input-group {
            position: relative;
            margin-bottom: 30px;
        }

        .input-group input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid #333;
            padding: 10px 0;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        .input-group label {
            position: absolute;
            top: 10px;
            left: 0;
            color: #666;
            pointer-events: none;
            transition: 0.3s;
            text-shadow: 0 0 6px #979494;
        }

        .input-group input:focus ~ label,
        .input-group input:valid ~ label {
            top: -15px;
            font-size: 12px;
            color: #0ff;
            text-shadow: 0 0 8px #0ff;
        }

        .input-group input:focus {
            border-bottom: 1px solid #0ff;
        }

        button#login_btn {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid #0ff;
            color: #0ff;
            font-size: 14px;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.4s;
            text-transform: uppercase;
        }

        button#login_btn:hover {
            background: #0ff;
            color: #000;
            box-shadow: 0 0 20px rgba(0, 251, 255, 0.4);
        }

        #user_id {
            border-bottom: 1px solid #0ff;
            padding-bottom: 2px;
            margin-right: 4px;
        }
    </style>
</head>
<body>
    <h1>部員ログイン</h1>
    <h3>おかえりなさい、<span id="user_id">ユーザー</span>さん</h3>
    
    <div class="login-container">
        <form id="login_form">
            <div class="input-group">
                <input type="password" required id='pass_input'>
                <label for='pass_input'>パスワード入力</label>
            </div>
            <button type="submit" id="login_btn">ログイン</button>
        </form>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const studentId = urlParams.get('ad');
        if (studentId) {
            document.getElementById('user_id').textContent = studentId;
        }

        document.getElementById('login_form').addEventListener('submit', function(event) {
            event.preventDefault();
            const password = document.getElementById('pass_input').value;
            if (password) {
                // ログイン処理
            } else {
                alert('パスワードを入力してください');
            }
        });
    </script>
</body>
</html>
